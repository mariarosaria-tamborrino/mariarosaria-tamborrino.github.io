# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Psicologa Lecce 
email: mariarosaria.tamborrino@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Dott.ssa Maria Rosaria Tamborrino, psicologa e psicoterapeuta
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # QUA USARE https:// the base hostname & protocol for your site, e.g. http://example.com
twitter_username: psicologalecce
github_username:  mariarosaria-tamborrino

# Build settings
markdown: kramdown
# theme: minima
remote_theme: "mmistakes/minimal-mistakes@4.13.0"

# -- Minimal mistakes specific settings
minimal_mistakes_skin: "myskin"

# QUA Non appena tutto sarà completato occorre specificare che il sito è in italiano.
# L'appuntamento è rimandato perché usare la lingua italiano all'inizio
# farebbe sparire alcuni elementi del tema per cui non c'è la traduzione
locale: "it"

title_separator: "|"
name: "Maria Rosaria Tamborrino"

host: 0.0.0.0

search: true

twitter:
  username: "psicologalecce"

facebook:
  username: "psicologalecce.tamborrino"

og_image: /assets/images/fiore_psicologa_lecce_sopraelevato_120.png

social:
  type:  Person
  name:  "Maria Rosaria Tamborrino"
  links:
    - "https://twitter.com/psicologalecce"
    - "https://facebook.com/psicologalecce.tamborrino"
    - "https://instagram.com/mariarosaria.tamborrino.psico"

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "UA-61101803-1"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/psicologalecce"
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook"
      url: "https://facebook.com/psicologalecce.tamborrino"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/mariarosaria.tamborrino.psico"

timezone: Europe/Rome

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
exclude:
  - Gemfile
  - Gemfile.lock


